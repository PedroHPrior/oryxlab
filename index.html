<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbbf24" />
    <meta name="description" content="OryxLab — DPS calculator and build optimizer for Realm of the Mad God. Compare items, optimize loadouts, import your RealmEye inventory." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>OryxLab · DPS Calculator</title>
    <script>
      // Apply persisted theme as early as possible to avoid flash of wrong
      // theme on first paint. Falls back to OS preference if not set.
      ;(function () {
        try {
          var stored = window.localStorage.getItem("oryxlab.v2.theme")
          var theme = stored ? JSON.parse(stored) : null
          if (theme === "dark") {
            document.documentElement.classList.add("dark")
          } else if (theme === "light") {
            document.documentElement.classList.remove("dark")
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            document.documentElement.classList.add("dark")
          }
        } catch (e) {
          /* ignore */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
