    <!-- Privacy-respecting analytics. Cookieless / GDPR-CCPA-PECR compliant.
         Only injected when the page is served from the production host so
         localhost dev traffic never hits the counter. -->
    <script>
      ;(function () {
        var allowedHosts = ["www.oryxlab.app", "oryxlab.app"]
        if (allowedHosts.indexOf(window.location.hostname) === -1) return
        var s = document.createElement("script")
        s.defer = true
        s.dataset.domain = "oryxlab.app"
        s.src = "https://plausible.io/js/script.outbound-links.js"
        document.head.appendChild(s)
      })()
    </script>
    <script>
      // One-shot rescue: a previous SW generation cached failed responses for
      // /assets/* + RealmEye sprite URLs. Even after we ship a new SW, returning
      // users may be served broken cached responses for one navigation before
      // the new SW activates — long enough for the JS bundle to fail to load
      // and the page to render blank. This unregisters every controller and
      // wipes every Cache Storage entry on the very first paint, then forces a
      // single reload so the next request goes direct to network.
      //
      // Versioned localStorage flag — bump RESCUE_VERSION the next time we
      // need to force-wipe across the install base. Idempotent: skips entirely
      // if the user has already been rescued at this version.
      ;(function () {
        var RESCUE_VERSION = "1"
        try {
          if (!("serviceWorker" in navigator)) return
          if (window.localStorage.getItem("oryxlab.swRescue") === RESCUE_VERSION) return
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            window.localStorage.setItem("oryxlab.swRescue", RESCUE_VERSION)
            if (!regs.length) return
            Promise.all(regs.map(function (r) { return r.unregister() })).then(function () {
              if (typeof caches === "undefined") { window.location.reload(); return }
              caches.keys().then(function (names) {
                Promise.all(names.map(function (n) { return caches.delete(n) })).then(function () {
                  window.location.reload()
                })
              }).catch(function () { window.location.reload() })
            })
          })
        } catch (e) { /* ignore */ }
      })()
    </script>
    <script>
      // Apply persisted theme as early as possible to avoid flash of wrong
      // theme on first paint. Falls back to OS preference if not set.
      ;(function () {
        try {
          var stored = window.localStorage.getItem("oryxlab.v2.theme")
          var theme = stored ? JSON.parse(stored) : null
          if (theme === "dark") {
            document.documentElement.classList.add("dark")
          } else if (theme === "light") {
            document.documentElement.classList.remove("dark")
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            document.documentElement.classList.add("dark")
          }
        } catch (e) {
          /* ignore */
        }
      })()
    </script>
